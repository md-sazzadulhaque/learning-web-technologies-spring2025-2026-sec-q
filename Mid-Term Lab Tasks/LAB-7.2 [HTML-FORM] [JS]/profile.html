<!DOCTYPE html>
<html>
<head>
    <title>Profile Picture</title>
</head>
<body>

<h3>Profile Picture</h3>

<form onsubmit="return checkProfile()">
    User Id: <input type="text" id="uid"><br><br>
    Picture: <input type="file" id="pic"><br><br>
    <input type="submit" value="Submit">
</form>

<script>
function checkProfile() {
    var uid = document.getElementById("uid").value;
    var file = document.getElementById("pic").value;

    if (uid == "") {
        alert("User Id cannot be empty!");
        return false;
    }

    var num = Number(uid);
    if (isNaN(num) || num <= 0) {
        alert("User Id must be positive number!");
        return false;
    }

    if (file == "") {
        alert("Please select a picture!");
        return false;
    }

    return true;
}
</script>

</body>
</html>
