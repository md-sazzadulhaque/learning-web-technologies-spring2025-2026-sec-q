<!DOCTYPE html>
<html>
<head>
    <title>Date of Birth</title>
</head>
<body>

<h3>Date of Birth</h3>

<form onsubmit="return checkDOB()">
    dd <input type="text" id="dd" size="2"> /
    mm <input type="text" id="mm" size="2"> /
    yyyy <input type="text" id="yyyy" size="4">
    <br><br>
    <input type="submit" value="Submit">
</form>

<script>
function checkDOB() {
    var dd = document.getElementById("dd").value;
    var mm = document.getElementById("mm").value;
    var yy = document.getElementById("yyyy").value;

    if (dd == "" || mm == "" || yy == "") {
        alert("Date cannot be empty!");
        return false;
    }

    var d = Number(dd);
    var m = Number(mm);
    var y = Number(yy);

    if (isNaN(d) || isNaN(m) || isNaN(y)) {
        alert("Please enter numbers only!");
        return false;
    }

    if (d < 0 || d > 31) {
        alert("Day must be 0-31");
        return false;
    }

    if (m < 1 || m > 12) {
        alert("Month must be 1-12");
        return false;
    }

    if (y < 1900 || y > 2016) {
        alert("Year must be between 1900-2016");
        return false;
    }

    return true;
}
</script>

</body>
</html>
