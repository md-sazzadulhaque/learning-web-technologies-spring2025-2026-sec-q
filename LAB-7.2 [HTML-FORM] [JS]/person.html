<!DOCTYPE html>
<html>
<head>
    <title>Person Profile</title>
</head>
<body>

<h2>PERSON PROFILE</h2>

<form onsubmit="return validateAll()">

    Name: <input type="text" id="name"><br><br>
    Email: <input type="text" id="email"><br><br>

    Gender:<br>
    <input type="radio" name="g" value="m"> Male
    <input type="radio" name="g" value="f"> Female
    <input type="radio" name="g" value="o"> Other
    <br><br>

    Date of Birth:<br>
    <input type="text" id="dd" size="2"> /
    <input type="text" id="mm" size="2"> /
    <input type="text" id="yy" size="4"> (dd/mm/yyyy)
    <br><br>

    Blood Group:
    <select id="blood">
        <option value="">Select</option>
        <option>A+</option>
        <option>A-</option>
        <option>B+</option>
        <option>B-</option>
        <option>AB+</option>
        <option>AB-</option>
        <option>O+</option>
        <option>O-</option>
    </select>
    <br><br>

    Degree:<br>
    <input type="checkbox" name="d" value="ssc"> SSC
    <input type="checkbox" name="d" value="hsc"> HSC
    <input type="checkbox" name="d" value="bsc"> BSc
    <input type="checkbox" name="d" value="msc"> MSc
    <br><br>

    Photo: <input type="file" id="photo"><br><br>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

</form>

<script>
function validateAll() {
    // name
    var name = document.getElementById("name").value;
    if (name == "") {
        alert("Name cannot be empty!");
        return false;
    }
    var words = name.trim().split(" ");
    if (words.length < 2) {
        alert("Name must have at least two words!");
        return false;
    }
    var firstChar = name.charAt(0);
    if (!((firstChar >= "A" && firstChar <= "Z") || (firstChar >= "a" && firstChar <= "z"))) {
        alert("Name must start with a letter!");
        return false;
    }
    for (var i = 0; i < name.length; i++) {
        var c = name.charAt(i);
        if (!((c >= "a" && c <= "z") || (c >= "A" && c <= "Z") || c == "." || c == "-" || c == " ")) {
            alert("Name can only have letters, dot(.) or dash(-)");
            return false;
        }
    }

    // email
    var email = document.getElementById("email").value;
    if (email == "") {
        alert("Email cannot be empty!");
        return false;
    }
    if (email.indexOf("@") == -1) {
        alert("Email must have @ symbol!");
        return false;
    }
    if (email.indexOf(".") == -1) {
        alert("Email must have . (dot)!");
        return false;
    }

    // gender
    var g = document.getElementsByName("g");
    var hasGender = false;
    for (var i = 0; i < g.length; i++) {
        if (g[i].checked) hasGender = true;
    }
    if (!hasGender) {
        alert("Select gender!");
        return false;
    }

    // dob
    var dd = document.getElementById("dd").value;
    var mm = document.getElementById("mm").value;
    var yy = document.getElementById("yy").value;
    if (dd == "" || mm == "" || yy == "") {
        alert("Date cannot be empty!");
        return false;
    }
    var d = Number(dd);
    var m = Number(mm);
    var y = Number(yy);
    if (isNaN(d) || isNaN(m) || isNaN(y)) {
        alert("Please enter numbers only for date!");
        return false;
    }
    if (d < 0 || d > 31) {
        alert("Day must be 0-31");
        return false;
    }
    if (m < 1 || m > 12) {
        alert("Month must be 1-12");
        return false;
    }
    if (y < 1900 || y > 2016) {
        alert("Year must be between 1900-2016");
        return false;
    }

    // blood
    var b = document.getElementById("blood").value;
    if (b == "") {
        alert("Select blood group!");
        return false;
    }

    // degree
    var deg = document.getElementsByName("d");
    var hasDeg = false;
    for (var i = 0; i < deg.length; i++) {
        if (deg[i].checked) hasDeg = true;
    }
    if (!hasDeg) {
        alert("Select at least one degree!");
        return false;
    }

    // photo
    var photo = document.getElementById("photo").value;
    if (photo == "") {
        alert("Please select photo!");
        return false;
    }

    return true;
}
</script>

</body>
</html>
