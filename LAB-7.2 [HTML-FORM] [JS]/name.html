<!DOCTYPE html>
<html>
<head>
    <title>Name Validation</title>
</head>
<body>

<h3>Name</h3>

<form name="myform" onsubmit="return checkName()">
    <input type="text" name="fname" id="fname">
    <br><br>
    <input type="submit" value="Submit">
</form>

<script>
function checkName() {
    var name = document.getElementById("fname").value;

    if (name == "") {
        alert("Name cannot be empty!");
        return false;
    }

    var words = name.trim().split(" ");
    if (words.length < 2) {
        alert("Name must have at least two words!");
        return false;
    }

    var firstChar = name.charAt(0);
    if (!((firstChar >= "A" && firstChar <= "Z") || (firstChar >= "a" && firstChar <= "z"))) {
        alert("Name must start with a letter!");
        return false;
    }

    for (var i = 0; i < name.length; i++) {
        var c = name.charAt(i);
        if (!((c >= "a" && c <= "z") || (c >= "A" && c <= "Z") || c == "." || c == "-" || c == " ")) {
            alert("Name can only have letters, dot(.) or dash(-)");
            return false;
        }
    }

    return true;
}
</script>

</body>
</html>
