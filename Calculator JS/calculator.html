<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
</head>
<body>

<h2>My Calculator</h2>

Number 1: <input type="text" id="num1"><br><br>
Number 2: <input type="text" id="num2"><br><br>

Operation: 
<select id="op">
    <option value="+">+</option>
    <option value="-">-</option>
    <option value="*">*</option>
    <option value="/">/</option>
</select><br><br>

<button onclick="calculate()">Calculate</button><br><br>

<div id="result"></div>

<script>
function calculate() {
    var n1 = document.getElementById("num1").value;
    var n2 = document.getElementById("num2").value;
    var operation = document.getElementById("op").value;

    var num1 = Number(n1);
    var num2 = Number(n2);

    if (isNaN(num1) || isNaN(num2)) {
        alert("Please enter numbers!");
        return;
    }

    var res;
    if (operation == "+") {
        res = num1 + num2;
    } else if (operation == "-") {
        res = num1 - num2;
    } else if (operation == "*") {
        res = num1 * num2;
    } else if (operation == "/") {
        if (num2 == 0) {
            alert("Cannot divide by zero!");
            return;
        }
        res = num1 / num2;
    }

    document.getElementById("result").innerHTML = "Result: " + res;
}
</script>

</body>
</html>
