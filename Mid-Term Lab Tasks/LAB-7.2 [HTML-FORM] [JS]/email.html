<!DOCTYPE html>
<html>
<head>
    <title>Email Validation</title>
</head>
<body>

<h3>Email</h3>
<p>hint: sample@example.com</p>

<form onsubmit="return checkEmail()">
    <input type="text" id="email">
    <br><br>
    <input type="submit" value="Submit">
</form>

<script>
function checkEmail() {
    var email = document.getElementById("email").value;

    if (email == "") {
        alert("Email cannot be empty!");
        return false;
    }

    if (email.indexOf("@") == -1) {
        alert("Email must have @ symbol!");
        return false;
    }

    if (email.indexOf(".") == -1) {
        alert("Email must have . (dot)!");
        return false;
    }

    return true;
}
</script>

</body>
</html>
